name: release

# Cut a release by pushing a tag:  git tag v0.2.1 && git push origin v0.2.1
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile tarballs + checksums
        run: make release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true

      # Auto-update the krew-index: renders .krew.yaml, fills uri+sha256 from the
      # release assets just published above, and opens an auto-approved PR.
      # Uses the hosted krew-release-bot service, so no krew-index token is needed.
      - name: Update krew-index
        uses: rajatjindal/krew-release-bot@v0.0.46
