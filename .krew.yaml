apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: why-pending
spec:
  version: {{ .TagName }}
  homepage: https://github.com/SaiRohithGuntupally/kubectl-why-pending
  shortDescription: Explain why a pod is stuck Pending.
  description: |
    why-pending re-runs the scheduler's filtering logic locally and explains, in
    plain English, why a pod cannot be scheduled — and what to change.

    It focuses on the scheduling and resource constraints that bare-metal /
    on-prem clusters hit but cloud clusters hide behind the autoscaler. When it
    finds no static blocker, it surfaces the scheduler's own event and points at
    the likely dynamic cause.

    Usage:
      kubectl why-pending                 # every Pending pod in the namespace
      kubectl why-pending my-pod -n data  # a specific pod
      kubectl why-pending -A              # all namespaces
  caveats: |
    Best-effort static analysis: it re-implements the common scheduler predicates,
    not the full scheduler (e.g. no priority/preemption and some dynamic behavior).
    It only reads cluster state and makes no changes.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    {{addURIAndSha "https://github.com/SaiRohithGuntupally/kubectl-why-pending/releases/download/{{ .TagName }}/kubectl-why-pending_darwin_arm64.tar.gz" .TagName }}
    bin: kubectl-why_pending
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    {{addURIAndSha "https://github.com/SaiRohithGuntupally/kubectl-why-pending/releases/download/{{ .TagName }}/kubectl-why-pending_darwin_amd64.tar.gz" .TagName }}
    bin: kubectl-why_pending
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    {{addURIAndSha "https://github.com/SaiRohithGuntupally/kubectl-why-pending/releases/download/{{ .TagName }}/kubectl-why-pending_linux_amd64.tar.gz" .TagName }}
    bin: kubectl-why_pending
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    {{addURIAndSha "https://github.com/SaiRohithGuntupally/kubectl-why-pending/releases/download/{{ .TagName }}/kubectl-why-pending_linux_arm64.tar.gz" .TagName }}
    bin: kubectl-why_pending
